name: Analyze New Entries (V3 - OpenAI)

on:
  schedule:
    - cron: "10 4 * * *" # Taiwan 12:10 (UTC+8)
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade --no-cache-dir youtube-transcript-api
          pip install -r requirements.txt
      - name: Show versions
        run: |
          python -c "import openai; print('openai version:', openai.__version__)"

      - name: Run analyzer
        env:
          # Required
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GSHEET_ID: ${{ secrets.GSHEET_ID }}
          GSHEET_SA_JSON: ${{ secrets.GSHEET_SA_JSON }}

          # Tuning knobs (optional)
          SHEET_NAME: daily_rank
          MAX_PER_RUN: 5
          VARIANT_COUNT: 10
          OPENAI_MODEL: gpt-4.1-mini
          OPENAI_MAX_OUTPUT_TOKENS: 3200
          OPENAI_TIMEOUT_SEC: 75
          SLEEP_BETWEEN_ROWS_SEC: 0.8
          AI_FILTER_ENABLED: 1
          AI_MIN_SCORE: 3
          AI_CLASSIFY_ENABLED: 1
          AI_CLASSIFY_MODEL: gpt-4.1-mini
          AI_CLASSIFY_MAX_TOKENS: 220
          AI_CLASSIFY_MIN_CONFIDENCE: 60
          AI_CLASSIFY_SLEEP_SEC: 0.3
          AI_VISUAL_ENABLED: 1
          AI_VISUAL_MODEL: gpt-4.1-mini
          AI_VISUAL_MAX_TOKENS: 220
          AI_VISUAL_MIN_CONFIDENCE: 55
        run: python analyze_pending.py
