name: Generate Meme Shorts

on:
  schedule:
    - cron: "20 6 * * *" # Taiwan 14:20 (UTC+8)
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: generate-meme-${{ github.ref }}
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    strategy:
      fail-fast: false
      matrix:
        variant_index: [0, 1, 2]
    env:
      PYTHONUNBUFFERED: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      SHEET_NAME: daily_rank
      OUTPUT_DIR: outputs
      MAX_PER_RUN_GEN: "2"
      GEN_VARIANT_INDEX: ${{ matrix.variant_index }}
      RETRY_FAILED: "0"
      TTS_MODEL: gpt-4o-mini-tts
      TTS_VOICE: alloy
      VIDEO_MODEL: sora-2
      VIDEO_SIZE_PRIMARY: 720x1280
      VIDEO_SIZE_FALLBACK: 1280x720
      POLL_INTERVAL_SEC: "10"
      VIDEO_CREATE_TIMEOUT_SEC: "600"
      OUT_W: "1080"
      OUT_H: "1920"
      FPS: "30"
      MAX_DURATION_SEC: "20"
      VIDEO_PAD_SEC: "1.2"
      SUB_MARGIN_V: "280"
      SUB_FONT_SIZE: "68"
      SUB_MAX_CHARS_PER_LINE: "18"
      YT_MODEL: gpt-4.1-mini
      YT_LANG: en
      YT_MAX_TITLE_CHARS: "70"
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Preflight secrets
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GSHEET_ID: ${{ secrets.GSHEET_ID }}
          GSHEET_SA_JSON: ${{ secrets.GSHEET_SA_JSON }}
        run: |
          python - <<'PY'
          import os, sys
          required = ["OPENAI_API_KEY", "GSHEET_ID", "GSHEET_SA_JSON"]
          missing = [k for k in required if not os.getenv(k)]
          if missing:
              print(f"Missing required secrets: {missing}")
              sys.exit(1)
          print("Secrets preflight OK")
          PY

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip setuptools wheel
          if [ -f requirements.txt ]; then pip install --no-cache-dir -r requirements.txt; fi
          pip install --no-cache-dir "openai>=1.55.0" gspread google-auth

      - name: Show versions
        run: |
          python --version
          ffmpeg -version | head -n 1
          python - <<'PY'
          import openai, gspread
          print('openai:', getattr(openai, '__version__', 'unknown'))
          print('gspread:', getattr(gspread, '__version__', 'unknown'))
          PY

      - name: Run generator
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GSHEET_ID: ${{ secrets.GSHEET_ID }}
          GSHEET_SA_JSON: ${{ secrets.GSHEET_SA_JSON }}
        run: python generate_meme_video.py

      - name: Upload outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sora-meme-shorts-variant-${{ matrix.variant_index }}-${{ github.run_id }}
          path: |
            outputs/**
          if-no-files-found: ignore
