name: Generate Meme Shorts (Sora + TTS + Subs + YouTube Meta) - 3 Variants

on:
  workflow_dispatch:
  schedule:
    - cron: "20 4 * * *"  # 台灣時間 12:20 (UTC 04:20)

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        variant_index: [0, 1, 2]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install "openai>=1.55.0" gspread google-auth

      - name: Run generator (matrix variant)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GSHEET_ID: ${{ secrets.GSHEET_ID }}
          GSHEET_SA_JSON: ${{ secrets.GSHEET_SA_JSON }}

          SHEET_NAME: daily_rank
          OUTPUT_DIR: outputs
          MAX_PER_RUN_GEN: 2
          GEN_VARIANT_INDEX: ${{ matrix.variant_index }}
          RETRY_FAILED: 0

          # TTS
          TTS_MODEL: gpt-4o-mini-tts
          TTS_VOICE: alloy

          # Sora / Videos API
          VIDEO_MODEL: sora-2
          VIDEO_SIZE_PRIMARY: 720x1280
          VIDEO_SIZE_FALLBACK: 1280x720
          POLL_INTERVAL_SEC: 10
          VIDEO_CREATE_TIMEOUT_SEC: 600

          # Output
          OUT_W: 1080
          OUT_H: 1920
          FPS: 30
          MAX_DURATION_SEC: 20

          # Subtitles safe area
          SUB_MARGIN_V: 280
          SUB_FONT_SIZE: 68
          SUB_MAX_CHARS_PER_LINE: 18

          # YouTube metadata
          YT_MODEL: gpt-4.1-mini
          YT_LANG: en
          YT_MAX_TITLE_CHARS: 70

        run: |
          python generate_meme_video.py

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: sora-meme-shorts-variant-${{ matrix.variant_index }}
          path: outputs/*.mp4
