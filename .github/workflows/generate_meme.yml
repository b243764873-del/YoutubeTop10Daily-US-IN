name: Generate AI Meme Shorts (Image + TTS + YouTube Metadata)

on:
  workflow_dispatch:
  schedule:
    - cron: "15 4 * * *"  # 台灣時間 12:15 (UTC 04:15)

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install "openai>=1.55.0" gspread google-auth

      - name: Run generator
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GSHEET_ID: ${{ secrets.GSHEET_ID }}
          GSHEET_SA_JSON: ${{ secrets.GSHEET_SA_JSON }}

          SHEET_NAME: daily_rank
          OUTPUT_DIR: outputs
          MAX_PER_RUN_GEN: 2
          GEN_VARIANT_INDEX: 0
          RETRY_FAILED: 0

          # TTS
          TTS_MODEL: gpt-4o-mini-tts
          TTS_VOICE: alloy

          # Image
          IMG_MODEL: gpt-image-1
          IMG_SIZE: 1024x1536
          IMG_QUALITY: medium
          IMG_OUTPUT_FORMAT: png

          # Video
          VIDEO_W: 1080
          VIDEO_H: 1920
          FPS: 30
          MAX_DURATION_SEC: 20

          # Subs (bottom)
          SUB_MARGIN_V: 220
          SUB_FONT_SIZE: 84

          # YouTube metadata
          YT_MODEL: gpt-4.1-mini
          YT_LANG: en
          YT_MAX_TITLE_CHARS: 70

        run: |
          python generate_meme_video.py

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: ai-meme-shorts
          path: outputs/*.mp4
